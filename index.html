<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Паразитология - интерактивный опросник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6d9 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .hero {
            background: linear-gradient(135deg, #1e4a3a, #0d2e23);
            color: white;
            padding: 40px 30px;
            border-radius: 40px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }

        .hero h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .hero p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .stats-panel {
            background: white;
            border-radius: 60px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .progress-info {
            font-weight: 600;
            color: #1e4a3a;
        }

        .reset-btn {
            background: #f5a623;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: #e09515;
            transform: scale(0.97);
        }

        .quiz-card {
            background: white;
            border-radius: 28px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .card-header {
            background: #2a5a3e;
            color: white;
            padding: 18px 24px;
        }

        .card-header h2 {
            font-size: 1.3rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 10px;
        }

        .taxonomy {
            font-size: 0.7rem;
            background: #3f785b;
            padding: 5px 12px;
            border-radius: 30px;
            font-family: monospace;
        }

        .question-area {
            padding: 24px;
        }

        .question-text {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #1a3a2a;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            background: #f9fdfb;
            padding: 12px 18px;
            border-radius: 24px;
            border: 1px solid #d4e6dc;
            cursor: pointer;
            transition: 0.1s;
        }

        .option:hover {
            background: #e8f3ed;
            border-color: #88b8a0;
        }

        input[type="radio"] {
            margin-top: 3px;
            accent-color: #2d784e;
            width: 18px;
            height: 18px;
        }

        .btn-submit {
            background: #2d784e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background: #1e5a3b;
        }

        .feedback {
            margin-top: 18px;
            padding: 16px 20px;
            border-radius: 24px;
            background: #f4fbf7;
            border-left: 5px solid #2d784e;
        }

        .correct-feedback {
            background: #e0f5e8;
            border-left-color: #13855e;
        }

        .wrong-feedback {
            background: #ffeae2;
            border-left-color: #c94f2c;
        }

        .info-block {
            background: #fef6e0;
            padding: 16px 22px;
            border-top: 1px solid #f0e4c0;
            font-size: 0.9rem;
            line-height: 1.45;
        }

        .info-title {
            font-weight: 800;
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
        }

        hr {
            margin: 12px 0;
            border-color: #e8dcb0;
        }

        footer {
            text-align: center;
            margin: 40px 0 20px;
            color: #4a6b5c;
            font-size: 0.85rem;
        }

        @media (max-width: 650px) {
            .hero h1 { font-size: 1.5rem; }
            .card-header h2 { flex-direction: column; }
            .question-text { font-size: 1rem; }
        }
    </style>
</head>

        { id:38, title:"Вошь головная", taxonomy:"Pediculidae", question:"Какое заболевание переносят головные вши?", options:["Болезнь Лайма","Сыпной и возвратный тиф","Малярию","Чуму"], correct:1, explanation:"Риккетсии и боррелии.", lifecycle:"Гнида → нимфа → имаго.", prevention:"Личная гигиена." },
        { id:39, title:"Вошь платяная", taxonomy:"Pediculidae", question:"Где обитает платяная вошь?", options:["В волосах","В одежде, белье","В подушках","На животных"], correct:1, explanation:"Складки одежды.", lifecycle:"Трансмиссивный переносчик.", prevention:"Стирка при 60°C." },
        { id:40, title:"Блоха (Pulex irritans)", taxonomy:"Pulicidae", question:"Какой механизм передачи чумы?", options:["Воздушно-капельный","Трансмиссивный через блох","Фекально-оральный","Контактный"], correct:1, explanation:"Блохи — переносчики чумы.", lifecycle:"Яйцо → личинка → куколка → имаго.", prevention:"Дератизация." },
        { id:41, title:"Постельный клоп (Cimex lectularius)", taxonomy:"Cimicidae", question:"Почему клопы редко переносят болезни?", options:["Короткий хоботок","Не испражняются во время кровососания","Живут в домах","Быстро погибают"], correct:1, explanation:"Возбудители не попадают в ранку.", lifecycle:"Личинка 5 возрастов.", prevention:"Дезинсекция." },
        { id:42, title:"Ротовой аппарат комнатной мухи", taxonomy:"Muscidae", question:"Как муха ест твёрдую пищу?", options:["Разгрызает","Смачивает слюной и фильтрует","Всасывает целиком","Не ест"], correct:1, explanation:"Разжижение слюной.", lifecycle:"Яйцо → личинка → куколка.", prevention:"Санитария, сетки." },

        { id:44, title:"Трипаносома (Trypanosoma brucei)", taxonomy:"Trypanosomatidae", question:"Как передаётся американский трипаносомоз (болезнь Чагаса)?", options:["Укус мухи цеце","Через фекалии триатомовых клопов","Контактно","Воздушно"], correct:1, explanation:"Клопы испражняются на кожу.", lifecycle:"Эпимастиготы в кишечнике клопа.", prevention:"Защита от клопов." },
        { id:45, title:"Малярийный плазмодий (Plasmodium vivax)", taxonomy:"Plasmodiidae", question:"В какой клетке крови происходит шизогония у плазмодия?", options:["Лейкоциты","Эритроциты","Гепатоциты","Тромбоциты"], correct:1, explanation:"Бесполое размножение в эритроцитах.", lifecycle:"Комар Anopheles — окончательный хозяин.", prevention:"Защита от комаров." }
    ];

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateStats() {
        let answered = 0;
        for (let i = 0; i < parasitesData.length; i++) {
            if (sessionStorage.getItem(`answer_${parasitesData[i].id}`) !== null) answered++;
        }
        const progressText = document.getElementById('progress-text');
        if (progressText) progressText.innerText = `📊 Пройдено: ${answered} из ${parasitesData.length}`;
    }

    function renderAllCards() {
        const container = document.getElementById('quiz-container');
        if (!container) return;
        let html = '';
        for (let i = 0; i < parasitesData.length; i++) {
            const p = parasitesData[i];
            const radioName = `q_${p.id}`;
            const saved = sessionStorage.getItem(`answer_${p.id}`);
            let userChoice = (saved !== null && !isNaN(parseInt(saved))) ? parseInt(saved) : null;

            let optionsHtml = '';
            for (let optIdx = 0; optIdx < p.options.length; optIdx++) {
                const isChecked = (userChoice === optIdx) ? 'checked' : '';
                optionsHtml += `
                    <label class="option" data-qid="${p.id}" data-opt="${optIdx}">
                        <input type="radio" name="${radioName}" value="${optIdx}" ${isChecked}>
                        <span class="option-text">${escapeHtml(p.options[optIdx])}</span>
                    </label>
                `;
            }

            let feedbackBlock = '';
            if (userChoice !== null) {
                const isCorrect = (userChoice === p.correct);
                const correctText = escapeHtml(p.options[p.correct]);
                feedbackBlock = `
                    <div class="feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}">
                        <strong>${isCorrect ? '✓ Верно' : '✗ Неверно'}</strong><br>
                        ${!isCorrect ? `Правильный ответ: ${correctText}.<br>` : ''}
                        ${escapeHtml(p.explanation)}
                    </div>
                    <div class="info-block">
                        <div class="info-title">🔄 Цикл развития</div>
                        <div>${escapeHtml(p.lifecycle)}</div>
                        <hr>
                        <div class="info-title">🛡️ Меры профилактики</div>
                        <div>${escapeHtml(p.prevention)}</div>
                    </div>
                `;
            } else {
                feedbackBlock = `<div class="feedback">🔍 Выберите вариант и нажмите «Проверить».</div>`;
            }

            html += `
                <div class="quiz-card" id="card-${p.id}">
                    <div class="card-header">
                        <h2>
                            <span>${escapeHtml(p.title)}</span>
                            <span class="taxonomy">${escapeHtml(p.taxonomy)}</span>
                        </h2>
                    </div>
                    <div class="question-area">
                        <div class="question-text">❓ ${escapeHtml(p.question)}</div>
                        <div class="options" data-group="${radioName}">
                            ${optionsHtml}
                        </div>
                        <button class="btn-submit" data-qid="${p.id}">✅ Проверить ответ</button>
                        <div class="feedback-area" id="feedback-${p.id}">
                            ${feedbackBlock}
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        document.querySelectorAll('.btn-submit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const qid = parseInt(btn.getAttribute('data-qid'));
                const parasite = parasitesData.find(p => p.id === qid);
                if (!parasite) return;
                const radioName = `q_${qid}`;
                const selectedRadio = document.querySelector(`input[name="${radioName}"]:checked`);
                if (!selectedRadio) {
                    const fbDiv = document.getElementById(`feedback-${qid}`);
                    if (fbDiv) fbDiv.innerHTML = `<div class="feedback wrong-feedback">⚠️ Выберите ответ.</div>`;
                    return;
                }
                const selectedVal = parseInt(selectedRadio.value);
                sessionStorage.setItem(`answer_${qid}`, selectedVal);
                renderAllCards();
                updateStats();
                document.getElementById(`card-${qid}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
        });

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                const radio = opt.querySelector('input[type="radio"]');
                if (radio && e.target.tagName !== 'INPUT') radio.checked = true;
            });
        });

        updateStats();
    }

    document.getElementById('reset-btn')?.addEventListener('click', () => {
        for (let i = 0; i < parasitesData.length; i++) {
            sessionStorage.removeItem(`answer_${parasitesData[i].id}`);
        }
        renderAllCards();
    });

    renderAllCards();
</script>
